  <body>
    <div id="root"></div>
    <!-- GitHub Pages SPA: restore deep-link path saved by 404.html -->
    <script>
      (function() {
        var r = sessionStorage.getItem('spa_redirect');
        if (r) {
          sessionStorage.removeItem('spa_redirect');
          var q = r.split('&');
          var p = q.shift();
          history.replaceState(null, null,
            '/' + p + (q.length ? '?' + q.join('&') : '') +
            (window.location.hash || '')
          );
        }
      })();
    </script>
  </body>
